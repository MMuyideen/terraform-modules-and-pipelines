name: Terraform Backend Setup - AWS

on:
  workflow_call:
    inputs:
      bucket_name:
        description: "S3 bucket name for Terraform backend"
        required: true
        type: string
      region:
        description: "AWS region for the S3 bucket"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  setup-aws-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region }}

      - name: Create S3 bucket
        run: |
          aws s3api create-bucket \
            --bucket ${{ inputs.bucket_name }} \
            --region ${{ inputs.region }} \
            ${{ inputs.region != 'us-east-1' && format('--create-bucket-configuration LocationConstraint={0}', inputs.region) || '' }} \
            || echo "Bucket already exists"

      - name: Enable versioning
        run: |
          aws s3api put-bucket-versioning \
            --bucket ${{ inputs.bucket_name }} \
            --versioning-configuration Status=Enabled

      - name: Enable server-side encryption
        run: |
          aws s3api put-bucket-encryption \
            --bucket ${{ inputs.bucket_name }} \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'

      - name: Block public access
        run: |
          aws s3api put-public-access-block \
            --bucket ${{ inputs.bucket_name }} \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
