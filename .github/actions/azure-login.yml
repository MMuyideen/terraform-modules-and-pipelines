name: 'Azure Login (OIDC with credentials fallback)'
description: >
  Logs in to Azure using OIDC federated identity. If OIDC login fails
  (e.g. the federated credential isn't configured yet), retries using
  a service principal credentials JSON as a fallback.

# inputs:
#   client-id:
#     description: 'Azure AD application (client) ID used for OIDC login'
#     required: false
#   tenant-id:
#     description: 'Azure AD tenant ID used for OIDC login'
#     required: false
#   subscription-id:
#     description: 'Azure subscription ID used for OIDC login'
#     required: false
#   creds:
#     description: 'Azure service principal credentials JSON, used only if OIDC login fails'
#     required: false

runs:
  using: "composite"
  steps:
    - name: Azure Login with OIDC
      id: oidc-login
      uses: azure/login@v3
      continue-on-error: true
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Azure Login with credentials
      if: steps.oidc-login.outcome == 'failure'
      uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
