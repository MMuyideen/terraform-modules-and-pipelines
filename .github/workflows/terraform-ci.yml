name: Terraform CI/CD Pipeline

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform configuration"
        required: false
        type: string
        default: "."
      cloud_provider:
        description: "Cloud provider (azure or aws)"
        required: true
        type: string
      environment:
        description: "Environment name (dev, staging, prod)"
        required: false
        type: string
        default: "dev"
      action:
        description: "Terraform action: plan, apply, or destroy"
        required: false
        type: string
        default: "plan"
      extra_tf_vars:
        description: 'Additional TF variables as JSON, e.g. {"os_type":"linux","vm_size":"Standard_B2ms"}'
        required: false
        type: string
        default: "{}"
      extra_commands:
        description: "Shell commands to run after a successful apply (e.g. kubectl apply)"
        required: false
        type: string
      backend_config:
        description: "Additional backend config arguments, e.g. -backend-config=key=value"
        required: false
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: false
      TF_VAR_subscription_id:
        required: false

jobs:
  terraform:
    name: "Terraform ${{ inputs.action }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    


    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Azure credentials
        if: inputs.cloud_provider == 'azure'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Set extra TF_VARs from JSON input ──
      - name: Set extra Terraform variables
        if: inputs.extra_tf_vars != '{}'
        run: |
          echo '${{ inputs.extra_tf_vars }}' | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> $GITHUB_ENV

      # ── Terraform workflow ──

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init 

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          terraform plan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy -no-color -auto-approve
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Post-apply commands ──
      - name: Run extra commands
        if: inputs.extra_commands != '' && inputs.action == 'apply' && success()
        run: ${{ inputs.extra_commands }}

      # ── Capture outputs ──
      - name: Terraform Outputs
        if: inputs.action == 'apply' && success()
        run: terraform output -json > terraform-outputs.json
        continue-on-error: true