name: Module test workflow for AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/aws/*'
      - 'test/aws/*'

permissions:
  contents: read
  id-token: write

jobs:
  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: "test/aws" 

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::413677591682:role/Github-action-oidc
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      # ── Terraform workflow ──

      - name: Terraform Init, Validate, Format Check
        uses: ./.github/actions/terraform-init-validate-fmt
        with:
          working-directory: "test/aws"

      - name: Terraform Plan
        run: |
          terraform plan

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve


  terraform_destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: terraform_apply
    if: github.run_attempt == success()

    defaults:
      run:
        working-directory: "test/aws"

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::413677591682:role/Github-action-oidc
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      # ── Terraform workflow ──

      - name: Terraform Init, Validate, Format Check
        uses: ./.github/actions/terraform-init-validate-fmt
        with:
          working-directory: "test/aws"
          format-check-continue-on-error: "true"

      - name: Terraform Plan
        run: |
          terraform plan -destroy

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve
