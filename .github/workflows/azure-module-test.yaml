name: Module test workflow for Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/azure/*'
      - 'test/azure/*'

concurrency:
  group: "azure-module-test"
  cancel-in-progress: false

jobs:
  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: "test/azure"
    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Azure Login
        uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Terraform workflow ──

      - name: Terraform Init, Validate, Format Check
        uses: ./.github/actions/terraform-init-validate-fmt
        with:
          working-directory: "test/azure"

      - name: Terraform Plan
        run: |
          terraform plan

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve

  terraform_destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: terraform_apply
    if: github.run_attempt == success()
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: "test/azure"
    env:
    #   ARM_USE_OIDC: "true"
    #   ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    #   ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    #   ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Azure Login
        uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Terraform workflow ──

      - name: Terraform Init, Validate, Format Check
        uses: ./.github/actions/terraform-init-validate-fmt
        with:
          working-directory: "test/azure"
          format-check-continue-on-error: "true"

      - name: Terraform Plan
        run: |
          terraform plan -destroy

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve
