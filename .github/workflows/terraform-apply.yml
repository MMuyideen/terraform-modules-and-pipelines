name: Terraform Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform configuration"
        required: true
        type: string
      # terraform_version:
      #   description: "Terraform version to use"
      #   required: false
      #   type: string
      #   default: "1.7.0"
      backend_config:
        description: "Backend configuration string (e.g., -backend-config=key=value)"
        required: false
        type: string
      var_file:
        description: "Path to Terraform variables file"
        required: false
        type: string
      cloud_provider:
        description: "Cloud provider (azure or aws)"
        required: true
        type: string
      environment:
        description: "Environment name (dev, staging, prod, etc.)"
        required: false
        type: string
        default: "dev"
      auto_approve:
        description: "Skip plan artifact and use -auto-approve"
        required: false
        type: boolean
        default: false
      # modules_repo:
      #   description: "Repository containing Terraform modules"
      #   required: false
      #   type: string
      #   default: "mmuyideen/terraform-modules-and-pipelines"
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      TF_VAR_admin_password:
        required: false
      TF_VAR_subscription_id:
        required: false

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      TF_VERSION: ${{ inputs.terraform_version }}
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # - name: Checkout modules repository
      #   uses: actions/checkout@v5
      #   with:
      #     repository: mmuyideen/terraform-modules-and-pipelines
      #     path: modules-repo
      #     token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4


      - name: Configure Azure credentials
        if: inputs.cloud_provider == 'azure'
        run: |
          echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        if: inputs.cloud_provider == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Set Terraform variables from secrets
        env:
          TF_VAR_admin_password: ${{ secrets.TF_VAR_admin_password }}
          TF_VAR_subscription_id: ${{ secrets.TF_VAR_subscription_id }}
        run: |
          if [ -n "$TF_VAR_admin_password" ]; then
            echo "TF_VAR_admin_password=$TF_VAR_admin_password" >> $GITHUB_ENV
          fi
          if [ -n "$TF_VAR_subscription_id" ]; then
            echo "TF_VAR_subscription_id=$TF_VAR_subscription_id" >> $GITHUB_ENV
          fi

      - name: Download plan artifact
        if: ${{ !inputs.auto_approve }}
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform init
        run: |
          terraform init \
            -backend=true \
            ${{ inputs.backend_config }}

      - name: Terraform apply (with plan)
        if: ${{ !inputs.auto_approve }}
        run: terraform apply -no-color tfplan

      - name: Terraform apply (auto-approve)
        if: ${{ inputs.auto_approve }}
        run: |
          terraform apply \
            -no-color \
            -auto-approve \
            ${{ inputs.var_file != '' && format('-var-file={0}', inputs.var_file) || '' }}
