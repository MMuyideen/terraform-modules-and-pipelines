name: Terraform Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform configuration"
        required: true
        type: string
      # terraform_version:
      #   description: "Terraform version to use"
      #   required: false
      #   type: string
      #   default: "1.7.0"
      backend_config:
        description: "Backend configuration string (e.g., -backend-config=key=value)"
        required: false
        type: string
      var_file:
        description: "Path to Terraform variables file"
        required: false
        type: string
      cloud_provider:
        description: "Cloud provider (azure or aws)"
        required: true
        type: string
      environment:
        description: "Environment name (dev, staging, prod, etc.)"
        required: false
        type: string
        default: "dev"
      auto_approve:
        description: "Skip plan artifact and use -auto-approve"
        required: false
        type: boolean
        default: false
      # modules_repo:
      #   description: "Repository containing Terraform modules"
      #   required: false
      #   type: string
      #   default: "mmuyideen/terraform-modules-and-pipelines"
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_REGION:
        required: false
      TF_VAR_admin_password:
        required: false
      TF_VAR_subscription_id:
        required: false

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: ./.github/actions/terraform-init-validate-fmt

      - name: Azure Login
        if: inputs.cloud_provider == 'azure'
        uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: AWS Login
        uses: ./.github/actions/aws-login
        with:
          role-to-assume: arn:aws:iam::413677591682:role/Github-action-oidc
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: GCP Login
        if: inputs.cloud_provider == 'gcp'
        uses: ./.github/actions/gcp-login
        with:
          service-account-key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}
          credentials_json: ${{ inputs.credentials_json }}

      - name: Terraform apply
        run: terraform apply -no-color tfplan

